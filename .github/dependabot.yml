version: 2
updates:
- package-ecosystem: bun
  directory: /
  schedule:
    interval: weekly
    day: sunday
    time: 08:00
    timezone: Europe/Athens
  open-pull-requests-limit: 3
  groups:
    all-non-major:
      patterns:
      - '*'
      update-types:
      - patch
      - minor
  labels:
  - dependencies
  rebase-strategy: auto
  commit-message:
    prefix: chore
    include: scope
  cooldown:
    default-days: 3
    semver-minor-days: 7
    semver-major-days: 14
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
    day: sunday
    time: 08:15
    timezone: Europe/Athens
  open-pull-requests-limit: 2
  groups:
    github-actions:
      patterns:
      - '*'
  labels:
  - dependencies
  rebase-strategy: auto
  commit-message:
    prefix: chore
    include: scope
  cooldown:
    default-days: 3
    semver-minor-days: 7

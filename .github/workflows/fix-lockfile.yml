name: Fix Lockfile

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Create PR with updated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bun.lock
          if git diff --staged --quiet; then
            echo "No lockfile changes needed"
            exit 0
          fi
          git checkout -b fix/sync-bun-lock
          git commit -m "chore: sync bun.lock"
          git push origin fix/sync-bun-lock
          gh pr create --title "chore: sync bun.lock" \
            --body "Syncs bun.lock after bot PRs that modified package.json without updating the lockfile." \
            --base main --head fix/sync-bun-lock
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

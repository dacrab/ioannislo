name: Sync Lockfile

on:
  pull_request:
    paths: ["package.json"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Commit updated lockfile
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && \
             [ "${{ github.event.pull_request.user.login }}" != "dependabot[bot]" ]; then
            echo "Not a Dependabot PR, skipping"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bun.lock
          if git diff --staged --quiet; then
            echo "No lockfile changes, skipping commit"
            exit 0
          fi
          git commit -m "chore: sync bun.lock"
          git pull --rebase origin ${{ github.head_ref || github.ref_name }}
          git push
